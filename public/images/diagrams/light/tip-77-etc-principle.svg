<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <!-- Center circle: ETC -->
  <circle cx="300" cy="220" r="46" fill="#eef2f7" stroke="#94a3b8" stroke-width="2"/>
  <text x="300" y="215" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="bold" fill="#1f2937">ETC</text>
  <text x="300" y="235" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#64748b">Easy To Change</text>
  <!-- Spoke lines -->
  <line x1="300" y1="174" x2="300" y2="94" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="344" y1="206" x2="382" y2="193" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="327" y1="264" x2="372" y2="326" stroke="#34d399" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="273" y1="264" x2="228" y2="326" stroke="#f87171" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="256" y1="206" x2="218" y2="193" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- SRP (top) -->
  <rect x="235" y="42" width="130" height="52" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="300" y="68" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="bold" fill="#60a5fa">SRP</text>
  <text x="300" y="84" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#64748b">Una razón para cambiar</text>
  <!-- DIP (upper-right) -->
  <rect x="382" y="157" width="140" height="52" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="452" y="183" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="bold" fill="#fbbf24">DIP</text>
  <text x="452" y="199" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#64748b">Depende de abstracciones</text>
  <!-- DRY (lower-right) -->
  <rect x="326" y="326" width="140" height="52" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="396" y="352" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="bold" fill="#34d399">DRY</text>
  <text x="396" y="368" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#64748b">Cambia en un solo lugar</text>
  <!-- OCP (lower-left) -->
  <rect x="134" y="326" width="140" height="52" rx="10" fill="#fff1f2" stroke="#f87171" stroke-width="2"/>
  <text x="204" y="352" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="bold" fill="#f87171">OCP</text>
  <text x="204" y="368" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#64748b">Abierto a extensión</text>
  <!-- LSP (upper-left) -->
  <rect x="78" y="157" width="140" height="52" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
  <text x="148" y="183" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="bold" fill="#a78bfa">LSP</text>
  <text x="148" y="199" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#64748b">Sustituible sin sorpresas</text>
</svg>
