<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <text x="300" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1f2937">Complejidad Esencial vs. Accidental</text>

  <!-- Outer circle: Accidental complexity -->
  <circle cx="300" cy="185" r="130" fill="#f87171" fill-opacity="0.14" stroke="#f87171" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- Inner circle: Essential complexity -->
  <circle cx="300" cy="185" r="70" fill="#eff6ff" stroke="#60a5fa" stroke-width="2.5"/>

  <!-- Inner label -->
  <text x="300" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Complejidad</text>
  <text x="300" y="194" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Esencial</text>

  <!-- Outer label top-right -->
  <text x="448" y="100" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Complejidad</text>
  <text x="448" y="118" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Accidental</text>

  <!-- Descriptive labels -->
  <text x="300" y="212" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#64748b">Inherente al problema</text>
  <text x="300" y="224" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#64748b">(finanzas, medicina, logística...)</text>

  <text x="448" y="136" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#64748b">Introducida por tus</text>
  <text x="448" y="148" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#64748b">decisiones técnicas</text>

  <!-- Arrow pointing inward -->
  <line x1="458" y1="202" x2="435" y2="210" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="435,210 442,204 440,213" fill="#f87171"/>

  <!-- Bottom message box -->
  <rect x="60" y="334" width="480" height="32" rx="16" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
  <text x="300" y="354" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#34d399">La simplicidad elimina lo accidental sin negar lo esencial</text>

  <!-- Arrow from box to outer ring -->
  <line x1="300" y1="334" x2="300" y2="318" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="300,315 294,327 306,327" fill="#34d399"/>
</svg>
