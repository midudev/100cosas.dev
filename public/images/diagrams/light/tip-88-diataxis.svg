<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Quadrant: Top-left — Tutoriales (blue) -->
  <rect x="90" y="55" width="206" height="138" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="193" y="115" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#60a5fa">Tutoriales</text>
  <text x="193" y="138" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b">Aprender haciendo</text>
  <!-- Quadrant: Top-right — Explicación (emerald) -->
  <rect x="304" y="55" width="206" height="138" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
  <text x="407" y="115" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#34d399">Explicación</text>
  <text x="407" y="138" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b">Entender conceptos</text>
  <!-- Quadrant: Bottom-left — Guías (amber) -->
  <rect x="90" y="201" width="206" height="138" rx="8" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="193" y="261" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#fbbf24">Guías</text>
  <text x="193" y="284" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b">Resolver problemas</text>
  <!-- Quadrant: Bottom-right — Referencia (red) -->
  <rect x="304" y="201" width="206" height="138" rx="8" fill="#fff1f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="407" y="261" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#f87171">Referencia</text>
  <text x="407" y="284" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b">Consultar datos</text>
  <!-- Axis labels -->
  <text x="300" y="40" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2937" letter-spacing="1">APRENDIZAJE</text>
  <text x="300" y="368" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2937" letter-spacing="1">TRABAJO</text>
  <text x="55" y="197" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2937" transform="rotate(-90,55,197)" letter-spacing="1">PRÁCTICA</text>
  <text x="545" y="197" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2937" transform="rotate(90,545,197)" letter-spacing="1">TEÓRICA</text>
  <!-- Axis arrows -->
  <path d="M270 29L300 19L330 29" stroke="#1f2937" stroke-width="1.5" fill="none"/>
  <path d="M270 373L300 383L330 373" stroke="#1f2937" stroke-width="1.5" fill="none"/>
  <path d="M77 167L67 197L77 227" stroke="#1f2937" stroke-width="1.5" fill="none"/>
  <path d="M523 167L533 197L523 227" stroke="#1f2937" stroke-width="1.5" fill="none"/>
