<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect width="600" height="520" rx="8" fill="#050505"/>

  <text x="300" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#e5e5e5">Algoritmo de cambio de código legacy</text>
  <text x="300" y="54" text-anchor="middle" font-size="11" fill="#737373">Michael Feathers — Working Effectively with Legacy Code</text>

  <!-- Step 1 -->
  <rect x="150" y="76" width="300" height="60" rx="8" fill="#0c0c0c" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="178" cy="106" r="14" fill="#60a5fa"/>
  <text x="178" y="111" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <text x="330" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e5e5">Identifica los puntos</text>
  <text x="330" y="118" text-anchor="middle" font-size="11" fill="#737373">de cambio</text>

  <!-- Arrow 1-2 -->
  <line x1="300" y1="136" x2="300" y2="160" stroke="#525252" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="150" y="164" width="300" height="60" rx="8" fill="#0c0c0c" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="178" cy="194" r="14" fill="#60a5fa"/>
  <text x="178" y="199" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <text x="330" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e5e5">Encuentra los puntos</text>
  <text x="330" y="206" text-anchor="middle" font-size="11" fill="#737373">de test</text>

  <!-- Arrow 2-3 -->
  <line x1="300" y1="224" x2="300" y2="248" stroke="#525252" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="150" y="252" width="300" height="60" rx="8" fill="#0c0c0c" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="178" cy="282" r="14" fill="#fbbf24"/>
  <text x="178" y="287" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <text x="330" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e5e5">Rompe dependencias</text>
  <text x="330" y="294" text-anchor="middle" font-size="11" fill="#737373">Aisla el código a testear</text>

  <!-- Arrow 3-4 -->
  <line x1="300" y1="312" x2="300" y2="336" stroke="#525252" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="150" y="340" width="300" height="60" rx="8" fill="#0c0c0c" stroke="#34d399" stroke-width="2"/>
  <circle cx="178" cy="370" r="14" fill="#34d399"/>
  <text x="178" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <text x="330" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e5e5">Escribe tests</text>
  <text x="330" y="382" text-anchor="middle" font-size="11" fill="#737373">de caracterización</text>

  <!-- Arrow 4-5 -->
  <line x1="300" y1="400" x2="300" y2="424" stroke="#525252" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="150" y="428" width="300" height="60" rx="8" fill="#0c0c0c" stroke="#34d399" stroke-width="2"/>
  <circle cx="178" cy="458" r="14" fill="#34d399"/>
  <text x="178" y="463" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5</text>
  <text x="330" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e5e5">Haz los cambios</text>
  <text x="330" y="470" text-anchor="middle" font-size="11" fill="#737373">Con la red de seguridad</text>

  <!-- Side annotation -->
  <rect x="475" y="76" width="105" height="148" rx="6" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="527" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#60a5fa">Entender</text>
  <text x="527" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#60a5fa">y proteger</text>
  <text x="527" y="145" text-anchor="middle" font-size="22" fill="#60a5fa">⇒</text>
  <text x="527" y="175" text-anchor="middle" font-size="9" fill="#737373">No empiezas</text>
  <text x="527" y="188" text-anchor="middle" font-size="9" fill="#737373">cambiando</text>

  <rect x="475" y="340" width="105" height="148" rx="6" fill="#071a12" stroke="#1a4a2e" stroke-width="1"/>
  <text x="527" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#34d399">Cambiar</text>
  <text x="527" y="379" text-anchor="middle" font-size="10" font-weight="600" fill="#34d399">con confianza</text>
  <text x="527" y="409" text-anchor="middle" font-size="22" fill="#34d399">⇒</text>
  <text x="527" y="439" text-anchor="middle" font-size="9" fill="#737373">Ahora sí,</text>
  <text x="527" y="452" text-anchor="middle" font-size="9" fill="#737373">con seguridad</text>
</svg>